<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />

    <!-- Favicon (PNG優先 + SVGフォールバック) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon512.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/icon192.png" />

    <!-- iOS ホーム画面追加用 -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-ios.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="worthit" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffe9f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0c12" media="(prefers-color-scheme: dark)" />

    <title>worthit — 満足度で未来の買い物を最適化する家計簿</title>
    <meta
      name="description"
      content="過去の支出に対する満足度（👍/👎）から、未来の買い物を最適化する家計簿アプリ。"
    />

    <!-- Open Graph (LinkedIn / Facebook / Slack preview) -->
    <meta property="og:title" content="worthit — 満足度で未来の買い物を最適化する家計簿" />
    <meta
      property="og:description"
      content="買い物を👍/👎で評価するだけ。AIがあなたに合った「使うべき支出」と「控えるべき支出」を提案します。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://worthit-sigma.vercel.app/" />
    <meta property="og:image" content="https://worthit-sigma.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="worthit" />

    <!-- Twitter (X) Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="worthit — Optimize tomorrow's spending from yesterday's satisfaction" />
    <meta
      name="twitter:description"
      content="Rate each purchase with 👍 or 👎. Get personalised advice on where your money makes you happiest."
    />
    <meta name="twitter:image" content="https://worthit-sigma.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
